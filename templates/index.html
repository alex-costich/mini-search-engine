<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terraria Search</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>

  <!-- Animated pixel background -->
  <canvas id="bg-canvas"></canvas>

  <div class="container">

    <!-- Header -->
    <header class="header">
      <div class="logo-block">
        <span class="logo-icon">⛏️</span>
        <h1 class="logo-title">TERRARIA<br><span class="logo-sub">SEARCH ENGINE</span></h1>
      </div>
      <div class="index-stats" id="index-stats">
        <span class="stat-pill">📄 <strong>{{ stats.total_docs }}</strong> docs</span>
        <span class="stat-pill">🔤 <strong>{{ stats.vocab_size }}</strong> terms</span>
        <span class="stat-pill">📏 avg <strong>{{ stats.avg_doc_length }}</strong> tokens</span>
      </div>
    </header>

    <!-- Search bar -->
    <div class="search-wrapper">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input
          type="text"
          id="search-input"
          class="search-input"
          placeholder="Search bosses, biomes, weapons..."
          autocomplete="off"
          spellcheck="false"
        />
        <button class="search-btn" id="search-btn">SEARCH</button>
      </div>

      <!-- Category filters -->
      <div class="filters">
        <button class="filter-btn active" data-cat="">ALL</button>
        <button class="filter-btn" data-cat="Boss">⚔️ BOSS</button>
        <button class="filter-btn" data-cat="Biome">🌿 BIOME</button>
        <button class="filter-btn" data-cat="Weapon">🗡️ WEAPON</button>
        <button class="filter-btn" data-cat="Event">🌙 EVENT</button>
        <button class="filter-btn" data-cat="Mechanic">⚙️ MECHANIC</button>
      </div>
    </div>

    <!-- Spell correction suggestion -->
    <div class="suggestion-bar" id="suggestion-bar" style="display:none;">
      <span class="suggestion-text">
        Did you mean: <button class="suggestion-link" id="suggestion-link"></button>?
      </span>
    </div>

    <!-- Search meta (time + count) -->
    <div class="search-meta" id="search-meta" style="display:none;">
      <span id="meta-text"></span>
    </div>

    <!-- Results -->
    <div class="results-grid" id="results-grid"></div>

    <!-- Empty state -->
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">🧱</div>
      <p>Type a query to begin your search.</p>
      <p class="empty-hint">Try: <em>moon lord</em>, <em>corruption biome</em>, <em>zenith crafting</em></p>
    </div>

    <!-- No results -->
    <div class="no-results" id="no-results" style="display:none;">
      <div class="empty-icon">💀</div>
      <p>No results found.</p>
      <p class="empty-hint">Check spelling or try a different query.</p>
    </div>

  </div>

  <script src="/static/main.js"></script>
</body>
</html>
